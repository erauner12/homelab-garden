apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: hcloud-rollouts-demo

resources:
  - service.yaml
  - ../../k8s/apps/workloads/demo-api/rollouts

labels:
  - pairs:
      homelab-garden.io/profile: hcloud-rollouts-demo

patches:
  - target:
      group: argoproj.io
      version: v1alpha1
      kind: AnalysisTemplate
      name: demo-api-readiness
    patch: |-
      - op: replace
        path: /spec/metrics/0/provider/job/spec/template/spec/containers/0/command/2
        value: kubectl -n hcloud-rollouts-demo get pods -l app.kubernetes.io/name=demo-api -o jsonpath='{.items[?(@.status.containerStatuses[0].ready==true)].metadata.name}' | wc -w
