apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../k8s/apps/workloads/demo-api/rollouts

patches:
  - target:
      group: argoproj.io
      version: v1alpha1
      kind: Rollout
      name: demo-api
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: ghcr.io/homelab-garden/demo-api:missing-progressive-delivery-demo
