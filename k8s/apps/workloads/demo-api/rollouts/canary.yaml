apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: demo-api
  labels:
    app.kubernetes.io/name: demo-api
    app.kubernetes.io/part-of: homelab-garden
    homelab-garden.io/layer: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-api
  strategy:
    canary:
      steps:
        - setWeight: 100
        - analysis:
            templates:
              - templateName: demo-api-readiness
  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-api
        app.kubernetes.io/part-of: homelab-garden
        homelab-garden.io/layer: app
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: demo-api
          image: python:3.12-alpine
          command:
            - python
            - -B
            - /app/demo_api.py
          env:
            - name: PORT
              value: "8080"
            - name: DEMO_API_VERSION
              value: "0.1.0"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: demo-api-app
              mountPath: /app
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: demo-api-app
          configMap:
            name: demo-api-app

