apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: demo-api-readiness
  labels:
    app.kubernetes.io/name: demo-api
    app.kubernetes.io/part-of: homelab-garden
    homelab-garden.io/layer: app
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: demo-api-readiness
  labels:
    app.kubernetes.io/name: demo-api
    app.kubernetes.io/part-of: homelab-garden
    homelab-garden.io/layer: app
subjects:
  - kind: ServiceAccount
    name: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: demo-api-readiness
