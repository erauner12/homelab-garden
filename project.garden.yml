apiVersion: garden.io/v2
kind: Project
name: homelab-garden

defaultEnvironment: local

variables:
  appNamespace: demo
  platformNamespace: platform
  demoAppName: demo-api

environments:
  - name: local
    defaultNamespace: demo
    variables:
      kubeContext: kind-homelab-garden
      riskReviewEnvironment: local
      releaseIntentPath: release-intents/demo-api-local.json
  - name: hcloud-lab
    defaultNamespace: demo
    variables:
      kubeContext: admin@homelab-garden-hcloud-lab
      riskReviewEnvironment: hcloud-lab
      releaseIntentPath: release-intents/demo-api-hcloud-lab.json
      # Materialized from infra/hcloud-lab Terraform/OpenTofu outputs after explicit apply.
      kubeconfigPath: infra/hcloud-lab/generated/kubeconfig

providers:
  - name: local-kubernetes
    environments: [local]
    context: ${var.kubeContext}
    setupIngressController: false
  - name: kubernetes
    environments: [hcloud-lab]
    kubeconfig: ${var.kubeconfigPath}
    context: ${var.kubeContext}
    setupIngressController: false

scan:
  include:
    - platform.garden.yml
    - apps.garden.yml
    - validation.garden.yml
    - gitops-plan.garden.yml
    - local-argocd.garden.yml
    - hcloud-argocd.garden.yml
    - progressive-delivery.garden.yml
    - investigation.garden.yml
    - workflows/*.garden.yml
