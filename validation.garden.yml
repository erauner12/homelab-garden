apiVersion: garden.io/v0
kind: Test
type: exec
name: static-validation
description: Render all Kustomize entrypoints and run lightweight static checks.
spec:
  command:
    - ./validation/static.sh
---
apiVersion: garden.io/v0
kind: Test
type: exec
name: schema-validation
description: Validate rendered Kustomize output against Kubernetes schemas.
spec:
  command:
    - ./validation/schema.sh
---
apiVersion: garden.io/v0
kind: Test
type: exec
name: contract-validation
description: Validate rendered Kustomize output against repo platform/app contracts.
spec:
  command:
    - go
    - test
    - ./tests/contracts
---
apiVersion: garden.io/v0
kind: Test
type: exec
name: policy-validation
description: Run local Kyverno CLI policy tests against fixtures.
spec:
  command:
    - ./validation/policy.sh
---
apiVersion: garden.io/v0
kind: Test
type: exec
name: smoke-platform
description: Verify the platform smoke deployment is available in the local cluster.
dependencies:
  - deploy.platform
spec:
  command:
    - env
    - SMOKE_NAMESPACE=platform
    - SMOKE_NAME=platform-smoke
    - SMOKE_URL=http://platform-smoke.platform.svc.cluster.local
    - SMOKE_EXPECTED_TEXT=homelab-garden platform-smoke ok
    - SMOKE_LABEL=platform
    - ./validation/smoke-service.sh
---
apiVersion: garden.io/v0
kind: Test
type: exec
name: smoke-demo-api
description: Verify the demo API deployment is available in the local cluster.
dependencies:
  - deploy.demo-api
spec:
  command:
    - ./validation/smoke-demo-api.sh
