apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-in-platform
  namespace: platform
  labels:
    app.kubernetes.io/name: app-in-platform
    app.kubernetes.io/part-of: homelab-garden
    homelab-garden.io/layer: app
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: app-in-platform
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app-in-platform
        app.kubernetes.io/part-of: homelab-garden
        homelab-garden.io/layer: app
    spec:
      containers:
        - name: app
          image: example.invalid/demo:latest
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
