apiVersion: apps/v1
kind: Deployment
metadata:
  name: selector-mismatch
  namespace: demo
  labels:
    app.kubernetes.io/name: selector-mismatch
    app.kubernetes.io/part-of: homelab-garden
    homelab-garden.io/layer: app
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: different-name
  template:
    metadata:
      labels:
        app.kubernetes.io/name: selector-mismatch
        app.kubernetes.io/part-of: homelab-garden
        homelab-garden.io/layer: app
    spec:
      containers:
        - name: app
          image: example.invalid/demo:latest
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
