apiVersion: apps/v1
kind: Deployment
metadata:
  name: missing-name-selector
  namespace: demo
  labels:
    app.kubernetes.io/name: missing-name-selector
    app.kubernetes.io/part-of: homelab-garden
    homelab-garden.io/layer: app
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: missing-name-selector
      tier: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: missing-name-selector
        app.kubernetes.io/part-of: homelab-garden
        homelab-garden.io/layer: app
        tier: api
    spec:
      containers:
        - name: app
          image: example.invalid/demo:latest
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
