apiVersion: apps/v1
kind: Deployment
metadata:
  name: missing-resource-keys
  namespace: demo
  labels:
    app.kubernetes.io/name: missing-resource-keys
    app.kubernetes.io/part-of: homelab-garden
    homelab-garden.io/layer: app
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: missing-resource-keys
  template:
    metadata:
      labels:
        app.kubernetes.io/name: missing-resource-keys
        app.kubernetes.io/part-of: homelab-garden
        homelab-garden.io/layer: app
    spec:
      initContainers:
        - name: init
          image: example.invalid/init:latest
          resources:
            requests:
              cpu: 10m
            limits:
              memory: 32Mi
      containers:
        - name: app
          image: example.invalid/demo:latest
          resources:
            requests:
              cpu: 10m
            limits:
              memory: 32Mi
