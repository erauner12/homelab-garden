apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-wrong-namespace
  namespace: demo
  labels:
    app.kubernetes.io/name: platform-wrong-namespace
    app.kubernetes.io/part-of: homelab-garden
    homelab-garden.io/layer: platform
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-wrong-namespace
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platform-wrong-namespace
        app.kubernetes.io/part-of: homelab-garden
        homelab-garden.io/layer: platform
    spec:
      containers:
        - name: app
          image: example.invalid/demo:latest
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
