apiVersion: garden.io/v0
kind: Workflow
name: local-validate
description: Render, deploy, and smoke-test the local Kustomize delivery path.
steps:
  - description: Run static Kustomize validation.
    command: [test, static-validation]
  - description: Validate rendered resources against Kubernetes schemas.
    command: [test, schema-validation]
  - description: Validate rendered platform/app contracts.
    command: [test, contract-validation]
  - description: Apply the local platform layer.
    command: [deploy, platform]
  - description: Apply the demo workload.
    command: [deploy, demo-api]
  - description: Smoke-test the demo workload.
    command: [test, smoke-demo-api]
