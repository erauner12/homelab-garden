apiVersion: v1
kind: Pod
metadata:
  generateName: smoke-curl-
  labels:
    app.kubernetes.io/name: smoke-curl
    app.kubernetes.io/component: smoke-test
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: curl
      image: curlimages/curl:8.8.0
      command: ["sleep", "300"]
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
